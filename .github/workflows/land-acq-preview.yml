name: Land Acq Pro — team preview (GitHub Pages)

# Publishes the Land Acq Pro pages (seller landing, pipeline dashboard,
# offer approval) to a public GitHub Pages URL so team members can review
# them on any device without a login. The pages run in offline demo mode
# with sample data (no live database) when served this way.

on:
  push:
    branches:
      - claude/land-acq-pro-missing-features-nswhea
    paths:
      - 'public/land-acq-pro/**'
      - '.github/workflows/land-acq-preview.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Land Acq Pro pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public/land-acq-pro
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
