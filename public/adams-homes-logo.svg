<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Roof/Wave design left side -->
  <path d="M 20 140 Q 40 120 60 140 Q 80 160 100 140" fill="none" stroke="#DC143C" stroke-width="15" stroke-linecap="round"/>

  <!-- Large A shape -->
  <g>
    <!-- Left stroke of A -->
    <line x1="80" y1="220" x2="150" y2="40" stroke="#003DA5" stroke-width="20" stroke-linecap="round"/>
    <!-- Right stroke of A -->
    <line x1="220" y1="40" x2="290" y2="220" stroke="#DC143C" stroke-width="20" stroke-linecap="round"/>
    <!-- Horizontal bar of A -->
    <line x1="110" y1="150" x2="260" y2="150" stroke="#003DA5" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- Triangle accent -->
  <polygon points="185,20 205,20 195,40" fill="#DC143C"/>

  <!-- Red line below logo -->
  <rect x="20" y="240" width="360" height="8" fill="#DC143C"/>
  <rect x="20" y="250" width="360" height="4" fill="#003DA5"/>

  <!-- ADAMS text -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#003DA5" text-anchor="middle">ADAMS</text>

  <!-- HOMES text -->
  <text x="200" y="318" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#003DA5" text-anchor="middle">HOMES</text>
</svg>