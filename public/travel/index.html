<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Porter Travel Planner</title>
<meta name="description" content="Plan trips together: itineraries, packing lists, budgets, and travel documents — all in one place, private to your family.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f9f9f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)">
<style>
/* ---------- tokens ---------- */
:root{
  --page:#f9f9f7; --card:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --line:#e1e0d9; --hair:rgba(11,11,11,.10); --wash:rgba(11,11,11,.045);
  --accent:#2a78d6; --accent-ink:#ffffff; --good:#0ca30c; --good-text:#006300; --bad:#d03b3b;
  --c1:#2a78d6; --c2:#1baf7a; --c3:#eda100; --c4:#008300; --c5:#4a3aa7; --c6:#e34948;
  --shadow:0 1px 2px rgba(11,11,11,.05), 0 8px 24px -12px rgba(11,11,11,.18);
  --shadow-lg:0 24px 64px -24px rgba(11,11,11,.35);
  --r:16px;
  /* skyline panorama (dusk) */
  --pan-sky1:#aecdf5; --pan-sky2:#ffd9a8; --pan-sun:#ffb648; --pan-sil1:#8fa6c9;
  --pan-sil2:#3c5580; --pan-water:#8fb9e6; --pan-star:0; --pan-flame:#ff9d3b;
  --pan-smoke:#ffffff; --pan-umb:#ff7b6b;
}
[data-theme="dark"]{
  --page:#0d0d0d; --card:#1a1a19; --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
  --line:#2c2c2a; --hair:rgba(255,255,255,.10); --wash:rgba(255,255,255,.06);
  --accent:#3987e5; --accent-ink:#ffffff; --good:#0ca30c; --good-text:#0ca30c; --bad:#d03b3b;
  --c1:#3987e5; --c2:#199e70; --c3:#c98500; --c4:#008300; --c5:#9085e9; --c6:#e66767;
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px -12px rgba(0,0,0,.6);
  --shadow-lg:0 24px 64px -24px rgba(0,0,0,.8);
  --pan-sky1:#0c1230; --pan-sky2:#39406e; --pan-sun:#f2e9cf; --pan-sil1:#28345a;
  --pan-sil2:#111a38; --pan-water:#16224a; --pan-star:.9; --pan-flame:#ffb15c;
  --pan-smoke:#c9d4ff; --pan-umb:#d95c6a;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --page:#0d0d0d; --card:#1a1a19; --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
    --line:#2c2c2a; --hair:rgba(255,255,255,.10); --wash:rgba(255,255,255,.06);
    --accent:#3987e5; --accent-ink:#ffffff; --good:#0ca30c; --good-text:#0ca30c; --bad:#d03b3b;
    --c1:#3987e5; --c2:#199e70; --c3:#c98500; --c4:#008300; --c5:#9085e9; --c6:#e66767;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px -12px rgba(0,0,0,.6);
    --shadow-lg:0 24px 64px -24px rgba(0,0,0,.8);
    --pan-sky1:#0c1230; --pan-sky2:#39406e; --pan-sun:#f2e9cf; --pan-sil1:#28345a;
    --pan-sil2:#111a38; --pan-water:#16224a; --pan-star:.9; --pan-flame:#ffb15c;
    --pan-smoke:#c9d4ff; --pan-umb:#d95c6a;
  }
}
/* ---------- base ---------- */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--page); color:var(--ink);
  min-height:100vh; line-height:1.45;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,select,textarea{font:inherit;color:var(--ink)}
a{color:var(--accent)}
#app{max-width:720px;margin:0 auto;padding:0 16px 96px}
::selection{background:var(--accent);color:var(--accent-ink)}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:8px;
  padding:12px 0 10px;margin:0 -16px;padding-left:16px;padding-right:16px;
  background:color-mix(in srgb, var(--page) 86%, transparent);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  padding-top:calc(12px + env(safe-area-inset-top));
}
.topbar .spacer{flex:1}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px;letter-spacing:-.02em}
.brand .globe{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--c1),var(--c5));display:grid;place-items:center;font-size:16px;box-shadow:var(--shadow)}
.iconbtn{
  width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-size:17px;
  color:var(--ink2);transition:background .15s;
}
.iconbtn:hover{background:var(--wash)}
.backbtn{display:flex;align-items:center;gap:4px;color:var(--ink2);font-weight:600;font-size:15px;padding:8px 12px 8px 6px;border-radius:12px;margin-left:-6px}
.backbtn:hover{background:var(--wash)}

/* ---------- generic ---------- */
.card{background:var(--card);border:1px solid var(--hair);border-radius:var(--r);box-shadow:var(--shadow)}
.section-title{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:26px 4px 10px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  font-weight:650;font-size:15px;padding:11px 18px;border-radius:13px;
  background:var(--accent);color:var(--accent-ink);transition:transform .1s, filter .15s;
}
.btn:hover{filter:brightness(1.07)} .btn:active{transform:scale(.97)}
.btn.ghost{background:var(--wash);color:var(--ink)}
.btn.subtle{background:none;color:var(--accent);padding:8px 10px}
.btn.danger{background:none;color:var(--bad)}
.btn.small{font-size:13.5px;padding:7px 13px;border-radius:10px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink2);background:var(--wash);border-radius:999px;padding:5px 11px}
.rowline{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.mono{font-variant-numeric:tabular-nums}
.muted{color:var(--muted)} .ink2{color:var(--ink2)}
.hint{font-size:13.5px;color:var(--muted)}

/* ---------- empty state ---------- */
.empty{padding:44px 24px;text-align:center}
.empty .big{font-size:44px;margin-bottom:10px}
.empty h3{font-size:18px;letter-spacing:-.01em;margin-bottom:6px}
.empty p{color:var(--ink2);font-size:14.5px;max-width:340px;margin:0 auto 18px}

/* ---------- panorama header (journal cities + Cape Canaveral home) ---------- */
.pan{position:relative;margin:0 -16px;height:228px;overflow:hidden;border-radius:0 0 30px 30px;box-shadow:var(--shadow)}
.pan svg{position:absolute;inset:0;width:100%;height:100%}
.pan .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,12,30,.10),transparent 30%,rgba(8,12,30,.18) 58%,rgba(8,12,30,.58));pointer-events:none}
.pan .overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:18px 20px;color:#fff;pointer-events:none}
.pan .kick{font-size:11.5px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;opacity:.9;text-shadow:0 1px 8px rgba(0,0,0,.4)}
.pan h1{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-top:3px;text-shadow:0 2px 14px rgba(0,0,0,.45)}
.pan .tag{font-size:13px;font-weight:600;opacity:.92;margin-top:4px;text-shadow:0 1px 8px rgba(0,0,0,.4)}
.pan .tools{position:absolute;top:calc(12px + env(safe-area-inset-top));right:14px;display:flex;gap:8px}
.pan .tools .iconbtn{background:rgba(255,255,255,.16);color:#fff;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.pan .tools .iconbtn:hover{background:rgba(255,255,255,.28)}

/* ---------- journals ---------- */
.jcard{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:15px 16px;margin-top:10px}
.jcard .score{font-size:12.5px;font-weight:800;color:#fff;background:linear-gradient(135deg,#e9a13b,#d97b2f);padding:4px 10px;border-radius:999px;white-space:nowrap}
.jhead{padding:20px;margin-top:14px}
.trophygrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.troph{background:var(--wash);border-radius:14px;padding:11px 12px}
.troph .tl{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.troph .tv{font-size:13.5px;font-weight:700;margin-top:2px;line-height:1.3}
.jl{display:flex;gap:10px;align-items:flex-start;padding:10px 16px;border-top:1px solid var(--line);font-size:14.5px}
.jl:first-child{border-top:0}
.jl .je{flex:none}

/* ---------- home ---------- */
.hero{
  position:relative;overflow:hidden;border-radius:22px;padding:26px 22px;color:#fff;
  background:linear-gradient(140deg,#17457f 0%, #2a78d6 42%, #6a4bc4 78%, #a45a9e 100%);
  box-shadow:var(--shadow-lg);cursor:pointer;
}
.hero::after{content:"";position:absolute;inset:0;background:
  radial-gradient(120% 90% at 90% -10%, rgba(255,255,255,.22), transparent 55%);}
.hero>*{position:relative;z-index:1}
.hero .kicker{font-size:12.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.82}
.hero h2{font-size:26px;letter-spacing:-.02em;margin:6px 0 2px;line-height:1.2}
.hero .sub{font-size:14.5px;opacity:.88}
.hero .count{display:flex;gap:14px;margin-top:18px}
.hero .cnum{font-size:30px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.hero .clab{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-top:4px}
.tripcard{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:15px 16px;margin-top:10px}
.tripcard:hover{border-color:var(--accent)}
.tripemoji{width:48px;height:48px;border-radius:14px;background:var(--wash);display:grid;place-items:center;font-size:25px;flex:none}
.tripcard h3{font-size:16.5px;letter-spacing:-.01em}
.tripcard .meta{font-size:13.5px;color:var(--ink2);margin-top:1px}
.tripcard .chev{color:var(--muted);font-size:18px}
.tripcard .badge{font-size:11.5px;font-weight:700;color:var(--accent);background:color-mix(in srgb,var(--accent) 12%, transparent);padding:3px 9px;border-radius:999px;white-space:nowrap}
.famrow{display:flex;flex-wrap:wrap;gap:8px}
.avatar{
  display:inline-flex;align-items:center;gap:7px;padding:6px 13px 6px 7px;border-radius:999px;
  background:var(--card);border:1px solid var(--hair);font-size:14px;font-weight:600;box-shadow:var(--shadow)
}
.avatar .dot{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:14px;color:#fff}
.addchip{border:1.5px dashed var(--line);border-radius:999px;padding:8px 14px;color:var(--muted);font-weight:600;font-size:14px}
.addchip:hover{color:var(--accent);border-color:var(--accent)}

/* ---------- trip header ---------- */
.triphead{padding:20px;margin-top:14px}
.triphead .toprow{display:flex;gap:14px;align-items:flex-start}
.triphead h1{font-size:23px;letter-spacing:-.02em;line-height:1.15}
.triphead .dest{color:var(--ink2);font-size:14.5px;margin-top:2px}
.triphead .datebar{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.countpill{background:color-mix(in srgb,var(--accent) 11%, transparent);color:var(--accent);font-weight:700}
[data-theme="dark"] .countpill{background:color-mix(in srgb,var(--accent) 20%, transparent)}
.travbar{display:flex;align-items:center;margin-top:14px;gap:2px}
.travbar .tdot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;color:#fff;border:2px solid var(--card);margin-right:-7px}
.travbar .tadd{margin-left:14px}

/* ---------- tabs ---------- */
.tabs{
  position:sticky;top:calc(58px + env(safe-area-inset-top));z-index:30;display:flex;gap:2px;margin:16px -16px 4px;padding:6px 16px;
  overflow-x:auto;scrollbar-width:none;
  background:color-mix(in srgb, var(--page) 86%, transparent);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:none;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:650;color:var(--ink2);
  padding:9px 14px;border-radius:999px;white-space:nowrap;transition:background .15s;
}
.tab:hover{background:var(--wash)}
.tab.on{background:var(--ink);color:var(--page)}

/* ---------- itinerary ---------- */
.daycard{padding:16px 16px 8px;margin-top:14px}
.dayhead{display:flex;align-items:baseline;gap:10px;padding-bottom:8px}
.dayhead .dnum{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.dayhead .ddate{font-size:15.5px;font-weight:700;letter-spacing:-.01em}
.stop{display:flex;gap:12px;padding:10px 0;border-top:1px solid var(--line)}
.stop .time{flex:none;width:62px;font-size:12.5px;font-weight:700;color:var(--muted);padding-top:3px;font-variant-numeric:tabular-nums;white-space:nowrap}
.stop .icon{flex:none;width:34px;height:34px;border-radius:10px;background:var(--wash);display:grid;place-items:center;font-size:16px}
.stop .body{flex:1;min-width:0}
.stop .t{font-size:15px;font-weight:650;letter-spacing:-.01em}
.stop.done .t{text-decoration:line-through;color:var(--muted)}
.stop .loc{font-size:13px;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.stop .notes{font-size:13.5px;color:var(--ink2);margin-top:2px;white-space:pre-wrap}
.stop .check{flex:none;padding-top:2px}
.addstop{width:100%;text-align:left;color:var(--muted);font-weight:600;font-size:14px;padding:11px 0;border-top:1px solid var(--line)}
.addstop:hover{color:var(--accent)}

/* checkbox */
.cb{appearance:none;-webkit-appearance:none;width:23px;height:23px;border-radius:8px;border:2px solid var(--line);display:inline-grid;place-items:center;cursor:pointer;transition:all .15s;background:var(--card);flex:none}
.cb:checked{background:var(--good);border-color:var(--good)}
.cb:checked::after{content:"";width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg) translate(-1px,-1px)}

/* ---------- packing ---------- */
.ownertabs{display:flex;gap:8px;overflow-x:auto;padding:14px 2px 4px;scrollbar-width:none}
.ownertabs::-webkit-scrollbar{display:none}
.ochip{flex:none;display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;background:var(--card);border:1px solid var(--hair);font-weight:650;font-size:14px;color:var(--ink2);box-shadow:var(--shadow)}
.ochip.on{background:var(--ink);color:var(--page);border-color:var(--ink)}
.packitem{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid var(--line)}
.packitem:first-child{border-top:0}
.packitem .txt{flex:1;font-size:15px;font-weight:550}
.packitem.done .txt{text-decoration:line-through;color:var(--muted)}
.packitem .who{font-size:12px;color:var(--muted)}
.progress{height:8px;border-radius:99px;background:var(--wash);overflow:hidden}
.progress>i{display:block;height:100%;border-radius:99px;background:var(--good);transition:width .4s cubic-bezier(.2,.8,.2,1)}
.packsum{padding:16px;margin-top:14px}
.tpl-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}

/* ---------- budget / dataviz ---------- */
.statrow{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px}
.stat{padding:14px 12px 12px;min-width:0}
.stat .lab{font-size:11.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.stat .val{font-size:clamp(15px,4.6vw,22px);font-weight:800;letter-spacing:-.02em;margin-top:3px;white-space:nowrap}
.stat .val.neg{color:var(--bad)}
.meterwrap{padding:16px;margin-top:10px}
.meter{height:12px;border-radius:99px;background:var(--wash);overflow:hidden;margin-top:10px}
.meter>i{display:block;height:100%;border-radius:99px;background:var(--accent);transition:width .4s}
.meter>i.over{background:var(--bad)}
.catbars{padding:16px;margin-top:14px}
.catrow{margin-top:13px}
.catrow:first-of-type{margin-top:8px}
.catrow .lr{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-bottom:5px}
.catrow .nm{font-weight:650;color:var(--ink);display:flex;align-items:center;gap:7px}
.catrow .nm .sw{width:10px;height:10px;border-radius:3px;flex:none}
.catrow .amt{font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink2)}
.catrow .bar{height:10px;border-radius:0 4px 4px 0;min-width:3px;transition:width .4s}
.expitem{display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--line);width:100%;text-align:left}
.expitem:first-child{border-top:0}
.expitem .cat{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:16px;flex:none;background:var(--wash)}
.expitem .d{font-size:15px;font-weight:600}
.expitem .m{font-size:12.5px;color:var(--muted)}
.expitem .amt{font-weight:750;font-variant-numeric:tabular-nums;font-size:15px}

/* ---------- mission control ---------- */
.mc-head{padding:16px;margin-top:14px}
.mc-next{font-size:13.5px;color:var(--ink2);margin-top:8px}
.mc-next b{color:var(--accent)}
.mc-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid var(--line);width:100%;text-align:left}
.mc-row:first-child{border-top:0}
.stl{width:27px;height:27px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:13px;font-weight:800;border:2.5px solid var(--bad);color:var(--bad);background:transparent;cursor:pointer}
.stl.y{border-color:#eda100;color:#9a6b00;background:color-mix(in srgb,#eda100 16%,transparent)}
[data-theme="dark"] .stl.y{color:#fab219;border-color:#c98500}
.stl.g{border-color:var(--good);background:var(--good);color:#fff}
.mc-row .ic{font-size:17px;flex:none}
.mc-row .nm{font-size:15px;font-weight:650}
.mc-row .nt{font-size:12.5px;color:var(--muted)}
.mc-row .due{color:var(--bad);font-weight:700}

/* ---------- wallet ---------- */
.wcard{padding:15px 16px;margin-top:12px}
.wcard .k{display:flex;align-items:center;gap:12px}
.wcard .wicon{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:18px;background:var(--wash);flex:none}
.wcard h4{font-size:15.5px;letter-spacing:-.01em}
.wcard .kind{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.code{
  display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;
  background:var(--wash);border-radius:11px;padding:10px 13px;
}
.code b{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:15px;letter-spacing:.1em}
.wcard .det{font-size:13.5px;color:var(--ink2);margin-top:10px;white-space:pre-wrap}

/* ---------- ideas ---------- */
.idea{padding:14px 16px;margin-top:12px}
.idea .t{font-size:15.5px;font-weight:600;letter-spacing:-.01em}
.idea .votes{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.votedot{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:14px;color:#fff;border:2px solid var(--card)}
.voteb{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:650;color:var(--ink2);background:var(--wash);border-radius:999px;padding:6px 12px}
.voteb.mine{background:color-mix(in srgb,var(--accent) 12%, transparent);color:var(--accent)}

/* ---------- fab ---------- */
.fab{
  position:fixed;right:max(18px, calc(50% - 342px));bottom:calc(20px + env(safe-area-inset-bottom));z-index:45;
  width:58px;height:58px;border-radius:19px;background:var(--accent);color:#fff;font-size:26px;
  display:grid;place-items:center;box-shadow:0 10px 30px -6px color-mix(in srgb, var(--accent) 60%, transparent);
  transition:transform .12s;
}
.fab:active{transform:scale(.93)}

/* ---------- modal ---------- */
.modal-back{position:fixed;inset:0;z-index:80;background:rgba(11,11,11,.45);display:flex;align-items:flex-end;justify-content:center;
  -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);animation:fade .18s}
@media(min-width:560px){.modal-back{align-items:center}}

<body>

<script>
"use strict";
/* =============================================================
   Porter Travel Planner — a private, offline-first family travel app.
   All data lives in this browser (localStorage). Export/Import
   moves plans between family phones. No accounts, no server.
   ============================================================= */

const KEY = "wander.v1";
const $ = s => document.querySelector(s);
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const TRIP_EMOJI = ["🏖️","🏔️","🎢","🗽","🏕️","🌴","⛷️","🛳️","🏰","🌋","🚗","✈️"];

const BUDGET_CATS = [

/* Mission Control categories (EP Planning Standard v2 §3). */
const MC_CATS = [
  ["flights","✈️","Flights"],

const MC_STATES = { r:"Needed", y:"In progress", g:"Ready" };
/* Completed trip journals — the family's institutional memory. Each new
   post-trip review adds an entry here (and to docs/ in the repo). */
const JOURNALS = [{
  id:"ca-2026",
  emoji:"🌉",
  title:"California World Cup Trip",
  city:"San Jose & San Francisco, CA",
  dest:"San Francisco, CA",
  dates:"Jun 30 – Jul 2, 2026",
  score:"9.7",
  summary:"SF icons + Silicon Valley + the FIFA World Cup. We skipped “seeing everything” and chose high-impact experiences — the trip that set our standard.",
  bestOf:[
    ["Best Photo","🌉 Battery Spencer"],

/* Dusk panorama: Golden Gate, NYC, Vegas, Charleston, Savannah oak, castle,

function pano(){
  /* Compact 520-unit composition so EVERY landmark survives a phone-width

    <rect x="322" y="222" width="7" height="46"/>
    <ellipse cx="325" cy="204" rx="30" ry="18"/><ellipse cx="303" cy="214" rx="15" ry="9"/><ellipse cx="347" cy="214" rx="14" ry="8"/>
    <path d="M311,216 v12 M337,215 v13" stroke="var(--pan-sil2)" stroke-width="2"/>
    <rect x="366" y="178" width="14" height="90"/><path d="M373,152 L384,180 L362,180 Z"/>
    <rect x="354" y="204" width="9" height="64"/><path d="M358.5,188 L365,206 L352,206 Z"/>
    <rect x="384" y="204" width="9" height="64"/><path d="M388.5,188 L395,206 L382,206 Z"/>
    <path d="M404,268 q6,-24 -2,-44" stroke="var(--pan-sil2)" stroke-width="4.5" fill="none"/>
    <path d="M402,222 q-14,-9 -25,-2 q12,-3 25,5 M402,222 q3,-15 15,-20 q-9,9 -11,22 M402,222 q16,-8 26,1 q-13,-4 -26,3" />
    <rect x="424" y="248" width="52" height="4.5"/>
    <path d="M430,252 v13 M444,252 v14 M458,252 v13 M470,252 v12" stroke="var(--pan-sil2)" stroke-width="2.5"/>
    <rect x="498" y="188" width="10" height="80"/>
    <path d="M498,196 h10 M498,210 h10 M498,224 h10 M498,238 h10" stroke="var(--pan-sky2)" stroke-width="1.8" opacity=".5"/>
  </g>
  <!-- umbrella (accent) -->
  <rect x="414" y="236" width="2.5" height="32" fill="var(--pan-sil2)"/>
  <path d="M400,240 a16,14 0 0 1 32,0 Z" fill="var(--pan-umb)"/>
  <!-- rocket -->
  <g>
    <rect x="484" y="164" width="7" height="94" fill="url(#pplume)"/>
    <ellipse cx="487" cy="258" rx="13" ry="6" fill="var(--pan-smoke)" opacity=".8"/>
    <ellipse cx="475" cy="262" rx="8" ry="4" fill="var(--pan-smoke)" opacity=".6"/>
    <ellipse cx="500" cy="262" rx="8" ry="4" fill="var(--pan-smoke)" opacity=".6"/>
    <path d="M482,166 L487.5,180 L493,166 Z" fill="var(--pan-flame)"/>
    <rect x="482" y="126" width="11" height="40" rx="3.5" fill="#e8ecf5"/>
    <path d="M482,130 L487.5,110 L493,130 Z" fill="#e8ecf5"/>
    <path d="M482,166 L476,173 L482,157 Z" fill="#c2c9da"/>

</svg>`;
}
const PACK_TEMPLATES = {
  "Essentials ✅": ["IDs & passports","Phone chargers","Medications","Wallet","Sunglasses","Headphones","Water bottles","Snacks"],
  "Beach 🏖️": ["Swimsuits","Sunscreen","Beach towels","Flip flops","Sun hats","Beach bag","Goggles"],
  "Cold weather ❄️": ["Coats","Gloves","Beanies","Thermal layers","Warm boots","Hand warmers","Scarves"],
  "Flight ✈️": ["Boarding passes","Neck pillows","Downloaded movies","Gum","Empty water bottle","Pen for forms","Carry-on locks"],
  "Road trip 🚗": ["Car snacks","Road trip playlist","Car charger","Trash bags","Paper towels","Travel games","First-aid kit"],
  "Kids 🧸": ["Favorite stuffed animal","Tablet + kid headphones","Extra change of clothes","Wipes","Night light","Activity books"],
  "Toiletries 🪥": ["Toothbrushes","Toothpaste","Shampoo","Deodorant","Hairbrush","Contacts / glasses","Razor"],
};

/* ---------- state ---------- */
let S = load();
let R = loadR();   // route: {view:'home'|'trip'|'settings', trip, tab, packOwner}

function blank(){ return { v:1, familyName:"", currency:"$", theme:"auto", family:[], trips:[] }; }
function normalize(d){
  const s = Object.assign(blank(), d);
  for (const t of s.trips){
    t.mission = t.mission || { purpose:"", cats:{} };
    t.mission.cats = t.mission.cats || {};
    for (const [k] of MC_CATS) t.mission.cats[k] = t.mission.cats[k] || { s:"r", note:"" };
    t.type = t.type || "vacation";
    // Trips from before the intake gate are grandfathered as complete.
    t.intake = t.intake || { mode:"committed", fixed:"", complete:true };
  }
  return s;
}
function load(){
  try{
    const d = JSON.parse(localStorage.getItem(KEY));
    if (d && d.v === 1 && Array.isArray(d.trips)) return normalize(d);
  }catch(e){}
  return blank();
}
function loadR(){
  try{
    const r = JSON.parse(sessionStorage.getItem(KEY + ".route"));
    if (r && r.view) return r;
  }catch(e){}
  return { view:"home", trip:null, tab:"plan", packOwner:"all" };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
function go(patch){ Object.assign(R, patch); sessionStorage.setItem(KEY + ".route", JSON.stringify(R)); render(); }

/* ---------- date helpers (all local-time, no TZ surprises) ---------- */
function pd(iso){ const [y,m,d] = iso.split("-").map(Number); return new Date(y, m-1, d); }
function iso(d){ return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function today(){ return iso(new Date()); }
const WD = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"], MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtD(isoStr, wd){ if(!isoStr) return ""; const d = pd(isoStr); return (wd ? WD[d.getDay()] + ", " : "") + MO[d.getMonth()] + " " + d.getDate(); }
function fmtRange(a, b){
  if (!a) return "Dates TBD";
  if (!b || a === b) return fmtD(a);
  const da = pd(a), db = pd(b);
  const yr = db.getFullYear() !== new Date().getFullYear() ? ", " + db.getFullYear() : "";
  if (da.getMonth() === db.getMonth()) return MO[da.getMonth()] + " " + da.getDate() + "–" + db.getDate() + yr;
  return fmtD(a) + " – " + fmtD(b) + yr;
}
function daysBetween(a, b){ return Math.round((pd(b) - pd(a)) / 864e5); }
function tripDays(t){
  if (!t.start) return [];
  const out = [], end = t.end || t.start;
  let d = pd(t.start);
  const last = pd(end);
  let guard = 0;
  while (d <= last && guard++ < 60){ out.push(iso(d)); d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1); }
  return out;
}
function fmtTime(hm){
  if (!hm) return "";
  let [h, m] = hm.split(":").map(Number);
  const ap = h >= 12 ? "PM" : "AM"; h = h % 12 || 12;
  return h + ":" + String(m).padStart(2,"0") + " " + ap;
}
function money(n){
  const v = Math.round(Number(n) * 100) / 100;
  return S.currency + v.toLocaleString(undefined, { minimumFractionDigits: v % 1 ? 2 : 0, maximumFractionDigits: 2 });
}

/* ---------- lookups ---------- */
const trip = id => S.trips.find(t => t.id === id);
const member = id => S.family.find(m => m.id === id);
function tripStatus(t){
  if (!t.start) return "someday";
  const now = today();
  if (now < t.start) return "upcoming";
  if (now > (t.end || t.start)) return "past";
  return "now";
}

/* =============================================================
   RENDER
   ============================================================= */
function render(){
  const app = $("#app");
  const y = window.scrollY;
  if (R.view === "trip" && !trip(R.trip)) R.view = "home";
  if (R.view === "journal" && !JOURNALS.some(j => j.id === R.jid)) R.view = "home";
  document.documentElement.dataset.theme = S.theme === "auto" ? "" : S.theme;
  app.innerHTML = R.view === "trip" ? vTrip() : R.view === "settings" ? vSettings() : R.view === "journal" ? vJournal() : vHome();
  window.scrollTo(0, Math.min(y, document.body.scrollHeight));
}

/* ---------- HOME ---------- */
function vHome(){
  const fam = S.familyName ? "The " + esc(S.familyName) + " Family" : "Porter Family Travel";
  const trips = [...S.trips];
  const upcoming = trips.filter(t => tripStatus(t) !== "past").sort((a,b) => (a.start||"9999") < (b.start||"9999") ? -1 : 1);
  const past = trips.filter(t => tripStatus(t) === "past").sort((a,b) => a.start < b.start ? 1 : -1);
  const next = upcoming.find(t => t.start);

  let hero = "";
  if (next){
    const st = tripStatus(next);
    const dleft = st === "upcoming" ? daysBetween(today(), next.start) : 0;
    const dayN = st === "now" ? daysBetween(next.start, today()) + 1 : 0;
    const total = next.start ? daysBetween(next.start, next.end || next.start) + 1 : 0;
    hero = `<div class="hero" data-a="openTrip" data-id="${next.id}" role="button" tabindex="0">
      <div class="kicker">${st === "now" ? "Happening now" : "Next adventure"}</div>
      <h2>${esc(next.emoji)} ${esc(next.name)}</h2>
      <div class="sub">${esc(next.dest || "")}${next.dest ? " · " : ""}${fmtRange(next.start, next.end)}</div>
      <div class="count">${
        st === "now"
        ? `<div><div class="cnum">Day ${dayN}</div><div class="clab">of ${total} — have fun!</div></div>`
        : `<div><div class="cnum">${dleft}</div><div class="clab">day${dleft === 1 ? "" : "s"} to go</div></div>
           <div><div class="cnum">${total}</div><div class="clab">day trip</div></div>`
      }</div>
    </div>`;
  }

  return `
  <div class="pan">
    ${pano()}
    <div class="veil"></div>
    <div class="tools noprint">
      <button class="iconbtn" data-a="theme" title="Theme">${S.theme === "dark" ? "🌙" : S.theme === "light" ? "☀️" : "🌗"}</button>
      <button class="iconbtn" data-a="settings" title="Settings">⚙️</button>
    </div>
    <div class="overlay">
      <div class="kick">From Cape Canaveral to everywhere</div>
      <h1>${fam}</h1>
      <div class="tag">plan · pack · wander · remember</div>
    </div>
  </div>

  ${hero ? `<div style="margin-top:18px">${hero}</div>` : ""}

  ${trips.length === 0 ? `
    <div class="card empty" style="margin-top:16px">
      <div class="big">🗺️</div>
      <h3>Where to first?</h3>
      <p>Plan the itinerary, pack together, track the budget, and keep every confirmation number in one place.</p>
      <button class="btn" data-a="addTrip">＋ Plan a trip</button>
      <div style="margin-top:10px"><button class="btn subtle" data-a="sample">or try a sample trip</button></div>
    </div>` : ""}

  ${upcoming.length ? `<div class="section-title">Trips</div>` : ""}
  ${upcoming.map(tripCard).join("")}

  ${past.length ? `<div class="section-title">Memories</div>` + past.map(tripCard).join("") : ""}

  <div class="section-title">Travel Journals</div>
  ${JOURNALS.map(j => `<button class="card jcard" data-a="openJournal" data-id="${j.id}">
    <span class="tripemoji">${j.emoji}</span>
    <span class="grow">
      <h3>${esc(j.title)}</h3>
      <div class="meta">${esc(j.city)} · ${esc(j.dates)}</div>
    </span>
    <span class="score">★ ${esc(j.score)}</span><span class="chev">›</span>
  </button>`).join("")}
  <p class="hint" style="margin:8px 6px">Every finished trip becomes a journal here — tap one to relive it, share it with family taking the same trip, or plan a return trip from its winners.</p>

  <div class="section-title">Family</div>
  <div class="famrow">
    ${S.family.map(m => `<button class="avatar" data-a="editMember" data-id="${m.id}">
        <span class="dot" style="background:${esc(m.color)}">${esc(m.emoji)}</span>${esc(m.name)}

/* ---------- TRIP ---------- */
function vTrip(){
  const t = trip(R.trip);
  const st = tripStatus(t);
  const days = t.start ? daysBetween(t.start, t.end || t.start) + 1 : 0;
  const count = st === "upcoming" ? `⏳ ${daysBetween(today(), t.start)} days to go`
    : st === "now" ? `🎉 Day ${daysBetween(t.start, today()) + 1} of ${days}`
    : st === "past" ? "📸 Memories" : "🗓️ Dates TBD";

  const TABS = [["mission","🎛️","Mission"],["plan","🗓️","Plan"],["pack","🧳","Packing"],["budget","💵","Budget"],["wallet","🎫","Wallet"],["ideas","💡","Ideas"]];
  const body = { mission:vMission, plan:vPlan, pack:vPack, budget:vBudget, wallet:vWallet, ideas:vIdeas }[R.tab] || vPlan;

  return `
  <div class="topbar">
    <button class="backbtn" data-a="home">‹ Trips</button>
    <div class="spacer"></div>
    <button class="iconbtn noprint" data-a="print" title="Print plan">🖨️</button>
    <button class="iconbtn noprint" data-a="editTrip" title="Edit trip">✏️</button>
  </div>

  <div class="card triphead">
    <div class="toprow">
      <span class="tripemoji" style="width:54px;height:54px;font-size:28px">${esc(t.emoji)}</span>
      <div class="grow">
        <h1>${esc(t.name)}</h1>
        <div class="dest">${esc(t.dest || "Somewhere wonderful")}</div>
      </div>
    </div>
    <div class="datebar">
      <span class="pill">📅 ${fmtRange(t.start, t.end)}</span>
      <span class="pill countpill">${count}</span>
      <span class="pill">${TRIP_TYPES[t.type] || TRIP_TYPES.vacation}</span>
      ${t.intake.mode ? `<span class="pill">${t.intake.mode === "research" ? "🔎 Researching" : "🔒 Committed"}</span>` : ""}
    </div>
    <div class="travbar">
      ${t.travelers.map(id => { const m = member(id); return m ? `<span class="tdot" title="${esc(m.name)}" style="background:${esc(m.color)}">${esc(m.emoji)}</span>` : ""; }).join("")}
      <button class="btn subtle small tadd noprint" data-a="pickTravelers">${t.travelers.length ? "Edit travelers" : "＋ Who’s going?"}</button>
    </div>
    ${t.notes ? `<p style="font-size:14px;color:var(--ink2);margin-top:12px;white-space:pre-wrap">${esc(t.notes)}</p>` : ""}
  </div>

  <div class="tabs noprint">
    ${TABS.map(([k,e,l]) => `<button class="tab ${R.tab === k ? "on" : ""}" data-a="tab" data-id="${k}">${e} ${l}</button>`).join("")}
  </div>

  ${body(t)}`;
}

/* ---------- MISSION CONTROL ---------- */
function mcStatus(t, k){
  // Packing status is computed from the packing tab, never stored.
  if (k === "packing"){
    const n = t.packing.length, d = t.packing.filter(p => p.done).length;
    if (!n) return { s:"r", note:"No list yet" };
    return d === n ? { s:"g", note:"All " + n + " items packed" } : { s:"y", note: d + " of " + n + " packed" };
  }
  return t.mission.cats[k];
}
function verifyWindow(t){
  if (!t.start) return null;
  const s = pd(t.start);
  const from = new Date(s); from.setDate(s.getDate() - 14);
  const to = new Date(s); to.setDate(s.getDate() - 7);
  return { from: iso(from), to: iso(to) };
}
function vMission(t){
  const rows = MC_CATS.map(([k, e, n]) => ({ k, e, n, ...mcStatus(t, k) }));
  const ready = rows.filter(r => r.s === "g").length;
  const next = rows.find(r => r.s !== "g");
  const vw = verifyWindow(t);
  const verifyDue = vw && today() >= vw.from && t.mission.cats.verify.s !== "g";
  // Wallet entries hint that a category is handled.
  const inWallet = { flights:"flight", hotel:"stay", rental:"car", tickets:"ticket" };

  return `
  <div class="card mc-head">
    <div class="rowline">
      <b style="font-size:15px">Planning progress</b><span class="grow"></span>
      <b class="mono" style="color:${ready === rows.length ? "var(--good-text)" : "var(--ink2)"}">${ready} of ${rows.length} ready</b>
    </div>
    <div class="progress" style="margin-top:9px"><i style="width:${Math.round(ready / rows.length * 100)}%"></i></div>
    ${t.mission.purpose ? `<div class="mc-next">🎯 ${esc(t.mission.purpose)}</div>` : `<button class="btn subtle small" style="margin-top:6px;padding-left:0" data-a="mcPurpose">＋ Set trip purpose</button>`}
    ${t.intake.fixed ? `<div class="mc-next">📌 Locked events: <b>${esc(t.intake.fixed)}</b></div>` : ""}
    ${t.intake.complete ? "" : `<div class="mc-next due" style="color:var(--bad)">🔒 Intake unfinished — <b>log confirmed bookings</b> before planning. <button class="btn subtle small" style="padding:0 4px" data-a="resumeIntake">Finish now</button></div>`}
    ${ready === rows.length
      ? `<div class="mc-next">🎉 <b>Mission ready — everything is green.</b></div>`
      : next ? `<div class="mc-next">Next step: <b>${next.e} ${esc(next.n)}</b></div>` : ""}
    ${verifyDue ? `<div class="mc-next due" style="color:var(--bad)">⏰ Final verification window is open (${fmtD(vw.from)} – ${fmtD(vw.to)}): confirm hours, parking, reservations, bag policy, lounge access.</div>` : ""}
  </div>

  <div class="card" style="margin-top:12px">
    ${rows.map(r => {
      const wk = inWallet[r.k];
      const hasW = wk && t.wallet.some(w => w.kind === wk);
      const sub = r.note ? esc(r.note) : MC_STATES[r.s] + (hasW ? " · in wallet ✓" : "");
      return `<div class="mc-row">
        <button class="stl ${r.s}" data-a="mcCycle" data-id="${r.k}" title="${MC_STATES[r.s]} — tap to change">${r.s === "g" ? "✓" : r.s === "y" ? "…" : "!"}</button>
        <span class="ic">${r.e}</span>
        <button class="grow" data-a="mcEdit" data-id="${r.k}" style="text-align:left">
          <div class="nm">${esc(r.n)}</div>
          <div class="nt ${r.k === "verify" && verifyDue ? "due" : ""}">${sub}</div>
        </button>
      </div>`;
    }).join("")}
  </div>
  <p class="hint" style="margin:12px 6px">Tap the light to cycle <b>! needed → … in progress → ✓ ready</b>. Tap a row to add details (flight numbers, confirmation notes, forecast). Packing tracks itself from the Packing tab.</p>`;
}

/* ---------- PLAN (itinerary) ---------- */
function vPlan(t){
  if (!t.intake.complete){
    return `<div class="card empty" style="margin-top:14px">
      <div class="big">🔒</div><h3>Intake first</h3>
      <p>Per the playbook: log confirmed flights and accommodations before any planning. It takes a minute.</p>
      <button class="btn" data-a="resumeIntake">Finish intake</button>
    </div>`;
  }
  const days = tripDays(t);
  if (!days.length){
    return `<div class="card empty" style="margin-top:14px">
      <div class="big">🗓️</div><h3>No dates yet</h3>
      <p>Set the trip dates and we’ll lay out a day-by-day plan you can fill in together.</p>
      <button class="btn" data-a="editTrip">Set dates</button>
    </div>`;
  }
  const byDay = {};
  for (const s of t.stops) (byDay[s.date] = byDay[s.date] || []).push(s);
  const extras = t.stops.filter(s => !days.includes(s.date));

  return days.map((d, i) => {
    const stops = (byDay[d] || []).sort((a,b) => (a.time || "99") < (b.time || "99") ? -1 : 1);
    const isToday = d === today();
    return `<div class="card daycard" ${isToday ? 'style="border-color:var(--accent)"' : ""}>
      <div class="dayhead">
        <span class="dnum">Day ${i+1}${isToday ? " · Today" : ""}</span>
        <span class="ddate">${fmtD(d, true)}</span>
      </div>
      ${stops.map(s => vStop(t, s)).join("") || ""}
      <button class="addstop noprint" data-a="addStop" data-id="${d}">＋ Add to this day…</button>
    </div>`;
  }).join("") + (extras.length ? `<div class="card daycard"><div class="dayhead"><span class="dnum">Outside trip dates</span></div>${extras.map(s => vStop(t, s)).join("")}</div>` : "");
}

function vStop(t, s){
  const mapq = s.loc ? `https://maps.google.com/?q=${encodeURIComponent(s.loc + (t.dest ? ", " + t.dest : ""))}` : "";
  return `<div class="stop ${s.done ? "done" : ""}">
    <span class="time">${s.time ? fmtTime(s.time) : "—"}</span>
    <span class="icon">${STOP_CATS[s.cat] || "📍"}</span>
    <button class="body" data-a="editStop" data-id="${s.id}" style="text-align:left">
      <div class="t">${esc(s.title)}</div>
      ${s.notes ? `<div class="notes">${esc(s.notes)}</div>` : ""}
    </button>
    ${s.loc ? `<a class="loc noprint" style="align-self:center;flex:none" href="${esc(mapq)}" target="_blank" rel="noopener">🧭 Map</a>` : ""}
    <span class="check noprint"><input type="checkbox" class="cb" data-c="stopDone" data-id="${s.id}" ${s.done ? "checked" : ""} title="Done"></span>
  </div>`;
}

/* ---------- PACKING ---------- */
function vPack(t){
  const owners = [["all","👨‍👩‍👧‍👦","Everyone"], ["shared","🧺","Shared"], ...t.travelers.map(id => { const m = member(id); return m ? [m.id, m.emoji, m.name] : null; }).filter(Boolean)];
  const cur = owners.some(o => o[0] === R.packOwner) ? R.packOwner : "all";
  const items = t.packing.filter(p => cur === "all" ? true : (p.owner || "shared") === cur);
  const done = items.filter(p => p.done).length;
  const pct = items.length ? Math.round(done / items.length * 100) : 0;

  return `
  <div class="ownertabs noprint">
    ${owners.map(([k,e,n]) => `<button class="ochip ${cur === k ? "on" : ""}" data-a="packOwner" data-id="${k}">${e} ${esc(n)}</button>`).join("")}
  </div>

  ${items.length ? `
  <div class="card packsum">
    <div class="rowline"><b style="font-size:15px">${done} of ${items.length} packed</b><span class="grow"></span><b class="mono" style="color:${pct === 100 ? "var(--good-text)" : "var(--ink2)"}">${pct}%</b></div>
    <div class="progress" style="margin-top:9px"><i style="width:${pct}%"></i></div>
    ${pct === 100 ? `<div style="margin-top:9px;font-size:14px;color:var(--good-text);font-weight:650">All packed — let’s go! 🎉</div>` : ""}
  </div>
  <div class="card" style="margin-top:12px">
    ${items.map(p => { const m = p.owner && p.owner !== "shared" ? member(p.owner) : null; return `
    <div class="packitem ${p.done ? "done" : ""}">
      <input type="checkbox" class="cb" data-c="packDone" data-id="${p.id}" ${p.done ? "checked" : ""}>
      <span class="txt">${esc(p.text)}</span>
      ${cur === "all" ? `<span class="who">${m ? esc(m.emoji + " " + m.name) : "🧺 Shared"}</span>` : ""}
      <button class="iconbtn noprint" style="width:30px;height:30px;font-size:14px" data-a="delPack" data-id="${p.id}">✕</button>
    </div>`; }).join("")}
  </div>` : `
  <div class="card empty" style="margin-top:12px">
    <div class="big">🧳</div><h3>Nothing on the list yet</h3>
    <p>Add items one by one, or start from a template — each person gets their own list.</p>
  </div>`}

  <div class="section-title">Quick-add a template</div>
  <div class="tpl-row" style="margin-top:0">
    ${Object.keys(PACK_TEMPLATES).map(k => `<button class="pill" data-a="tpl" data-id="${esc(k)}">${esc(k)}</button>`).join("")}
  </div>
  <p class="hint" style="margin:10px 4px">Templates add to <b>${esc(owners.find(o => o[0] === cur)[2])}</b>${cur === "all" ? " (as shared items)" : ""}. Duplicates are skipped.</p>

  <button class="fab noprint" data-a="addPack" title="Add item">＋</button>`;
}

/* ---------- BUDGET ---------- */
function vBudget(t){
  const ex = t.budget.expenses;
  const spent = ex.reduce((a,e) => a + Number(e.amount || 0), 0);
  const total = Number(t.budget.total || 0);
  const left = total - spent;
  const pct = total > 0 ? Math.min(100, spent / total * 100) : 0;
  const over = total > 0 && spent > total;

  const byCat = {};
  for (const e of ex) byCat[e.cat] = (byCat[e.cat] || 0) + Number(e.amount || 0);
  const cats = BUDGET_CATS.filter(c => byCat[c.k] > 0);
  const maxCat = Math.max(1, ...cats.map(c => byCat[c.k]));

  return `
  <div class="statrow">
    <div class="card stat"><div class="lab">Spent</div><div class="val mono">${money(spent)}</div></div>
    <button class="card stat" data-a="setBudget" style="text-align:left"><div class="lab">Budget ✏️</div><div class="val mono">${total ? money(total) : "—"}</div></button>
    <div class="card stat"><div class="lab">${left < 0 ? "Over by" : "Left"}</div><div class="val mono ${left < 0 ? "neg" : ""}">${total ? money(Math.abs(left)) : "—"}</div></div>
  </div>

  ${total > 0 ? `
  <div class="card meterwrap">
    <div class="rowline" style="font-size:13.5px"><b>${Math.round(spent / total * 100)}% of budget used</b><span class="grow"></span>${over ? `<b style="color:var(--bad)">over budget</b>` : ""}</div>
    <div class="meter"><i class="${over ? "over" : ""}" style="width:${pct}%"></i></div>
  </div>` : ""}

  ${cats.length ? `
  <div class="card catbars">
    <b style="font-size:15px">Where it’s going</b>
    ${cats.map(c => `
    <div class="catrow" title="${esc(c.n)}: ${money(byCat[c.k])} (${Math.round(byCat[c.k] / spent * 100)}% of spending)">
      <div class="lr"><span class="nm"><span class="sw" style="background:${c.c}"></span>${c.e} ${c.n}</span><span class="amt">${money(byCat[c.k])}</span></div>
      <div class="bar" style="background:${c.c};width:${Math.max(2, byCat[c.k] / maxCat * 100)}%"></div>
    </div>`).join("")}
  </div>` : ""}

  ${ex.length ? `
  <div class="section-title">Expenses</div>
  <div class="card">
    ${[...ex].sort((a,b) => (a.date || "") < (b.date || "") ? 1 : -1).map(e => {
      const c = BUDGET_CATS.find(x => x.k === e.cat) || BUDGET_CATS[5];
      const m = e.by ? member(e.by) : null;
      return `<button class="expitem" data-a="editExp" data-id="${e.id}">
        <span class="cat">${c.e}</span>
        <span class="grow"><div class="d">${esc(e.desc)}</div><div class="m">${c.n}${e.date ? " · " + fmtD(e.date) : ""}${m ? " · " + esc(m.name) : ""}</div></span>
        <span class="amt mono">${money(e.amount)}</span>
      </button>`;
    }).join("")}
  </div>` : `
  <div class="card empty" style="margin-top:14px">
    <div class="big">💵</div><h3>No expenses yet</h3>
    <p>Log spending as you go — flights, hotels, gelato — and see exactly where the money went.</p>
  </div>`}

  <button class="fab noprint" data-a="addExp" title="Add expense">＋</button>`;
}

/* ---------- WALLET ---------- */
function vWallet(t){

  ${t.wallet.length ? t.wallet.map(w => {
    const [ic, kn] = WALLET_KINDS[w.kind] || WALLET_KINDS.doc;
    return `<div class="card wcard">
      <div class="k">
        <span class="wicon">${ic}</span>

  <div class="card empty" style="margin-top:14px">

  <button class="fab noprint" data-a="addWallet" title="Add booking">＋</button>`;

/* ---------- IDEAS ---------- */
function vIdeas(t){
  return `
  ${t.ideas.length ? [...t.ideas].sort((a,b) => b.votes.length - a.votes.length).map(i => `
  <div class="card idea">
    <div class="rowline">
      <span class="grow t">${esc(i.text)}</span>
      <button class="iconbtn" style="width:30px;height:30px;font-size:14px" data-a="delIdea" data-id="${i.id}">✕</button>

let modalEl = null;
function closeModal(){ if (modalEl){ modalEl.remove(); modalEl = null; } }
function openModal(cfg){
  closeModal();
  modalEl = document.createElement("div");
  modalEl.className = "modal-back";
  modalEl.innerHTML = `<form class="modal">
    <h3>${esc(cfg.title)}</h3>
    ${cfg.fields.map(f => {
      if (f.type === "emoji") return `<div class="field"><label>${esc(f.label)}</label>
        <div class="emojirow" data-k="${f.k}">${f.options.map(e => `<button type="button" data-v="${esc(e)}" class="${e === f.value ? "on" : ""}">${esc(e)}</button>`).join("")}</div></div>`;
      if (f.type === "color") return `<div class="field"><label>${esc(f.label)}</label>
        <div class="colorrow" data-k="${f.k}">${f.options.map(c => `<button type="button" data-v="${esc(c)}" class="${c === f.value ? "on" : ""}" style="background:${esc(c)}"></button>`).join("")}</div></div>`;
      if (f.type === "members") return `<div class="field"><label>${esc(f.label)}</label>
        <div class="memberpick" data-k="${f.k}">${S.family.map(m => `<button type="button" data-v="${m.id}" class="${(f.value || []).includes(m.id) ? "on" : ""}"><span class="dot" style="background:${esc(m.color)}">${esc(m.emoji)}</span>${esc(m.name)}</button>`).join("") || `<span class="hint">No family members yet — add them from the home screen.</span>`}</div></div>`;
      if (f.type === "select") return `<div class="field"><label>${esc(f.label)}</label>
        <select name="${f.k}">${f.options.map(([v,l]) => `<option value="${esc(v)}" ${v === f.value ? "selected" : ""}>${esc(l)}</option>`).join("")}</select></div>`;
      if (f.type === "textarea") return `<div class="field"><label>${esc(f.label)}</label>
        <textarea name="${f.k}" placeholder="${esc(f.placeholder || "")}">${esc(f.value || "")}</textarea></div>`;
      const half = f.half ? "data-half" : "";
      return `<div class="field" ${half}><label>${esc(f.label)}</label>
        <input name="${f.k}" type="${f.type || "text"}" value="${esc(f.value ?? "")}" placeholder="${esc(f.placeholder || "")}"
          ${f.required ? "required" : ""} ${f.type === "number" ? 'inputmode="decimal" step="any" min="0"' : ""} autocomplete="off"></div>`;
    }).join("")}
    <div class="actions">
      ${cfg.onDelete ? `<button type="button" class="btn danger" data-x="del">Delete</button>` : ""}
      <button type="button" class="btn ghost" data-x="cancel">Cancel</button>
      <button type="submit" class="btn">${esc(cfg.submit || "Save")}</button>
    </div>
  </form>`;
  document.body.appendChild(modalEl);

  // pair up half-width date/time fields
  const halves = [...modalEl.querySelectorAll(".field[data-half]")];
  for (let i = 0; i < halves.length - 1; i += 2){
    const row = document.createElement("div"); row.className = "fieldrow";
    halves[i].before(row); row.append(halves[i], halves[i+1]);
  }

  const picked = {};
  for (const f of cfg.fields){
    if (f.type === "emoji" || f.type === "color") picked[f.k] = f.value;
    if (f.type === "members") picked[f.k] = [...(f.value || [])];
  }
  modalEl.addEventListener("click", e => {
    if (e.target === modalEl){ closeModal(); return; }
    const b = e.target.closest("button[data-v]");
    if (b){
      const wrap = b.parentElement, k = wrap.dataset.k, v = b.dataset.v;
      if (wrap.classList.contains("memberpick")){
        const arr = picked[k];
        const ix = arr.indexOf(v);
        ix >= 0 ? arr.splice(ix, 1) : arr.push(v);
        b.classList.toggle("on");
      } else {
        picked[k] = v;
        wrap.querySelectorAll("button").forEach(x => x.classList.toggle("on", x === b));
      }
      return;
    }
    const x = e.target.closest("button[data-x]");
    if (x){
      if (x.dataset.x === "cancel") closeModal();
      if (x.dataset.x === "del"){ closeModal(); cfg.onDelete(); }
    }
  });
  modalEl.querySelector("form").addEventListener("submit", e => {
    e.preventDefault();
    const vals = { ...picked };
    for (const el of e.target.elements) if (el.name) vals[el.name] = el.value.trim();
    closeModal();
    cfg.onSubmit(vals);
  });
  const first = modalEl.querySelector("input");
  if (first && window.matchMedia("(min-width:560px)").matches) first.focus();
}

let toastT = null;
function toast(msg){
  const el = $("#toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove("show"), 2200);
}
function confetti(){
  const cv = $("#confetti"), ctx = cv.getContext("2d");
  cv.width = innerWidth; cv.height = innerHeight;
  const P = [], colors = ["#2a78d6","#1baf7a","#eda100","#4a3aa7","#e34948","#e87ba4"];
  for (let i = 0; i < 120; i++) P.push({
    x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * .5,
    vy: 2.2 + Math.random() * 3, vx: (Math.random() - .5) * 1.6,
    s: 5 + Math.random() * 6, r: Math.random() * Math.PI, vr: (Math.random() - .5) * .25,
    c: colors[i % colors.length]
  });
  let frames = 0;
  (function tick(){
    ctx.clearRect(0, 0, cv.width, cv.height);
    for (const p of P){
      p.x += p.vx; p.y += p.vy; p.r += p.vr;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
      ctx.fillStyle = p.c; ctx.fillRect(-p.s/2, -p.s/3, p.s, p.s * .66);
      ctx.restore();
    }
    if (frames++ < 170) requestAnimationFrame(tick);
    else ctx.clearRect(0, 0, cv.width, cv.height);
  })();
}

      { k:"dest", label:"Destination", value:t.dest, placeholder:"e.g. Yellowstone" },
      { k:"type", label:"Trip type", type:"select", value:t.type || "vacation", options:Object.entries(TRIP_TYPES) },
      { k:"emoji", label:"Vibe", type:"emoji", options:TRIP_EMOJI, value:t.emoji || "🏖️" },
      { k:"start", label:"First day", type:"date", value:t.start, half:true },
      { k:"end", label:"Last day", type:"date", value:t.end, half:true },
      { k:"mode", label:"Researching or committed?", type:"select", value:t.intake.mode || "research",
        options:[["research","🔎 Just researching"],["committed","🔒 Committed — dates & events locked"]] },
      { k:"fixed", label:"Obligated events", type:"textarea", value:t.intake.fixed },
      { k:"travelers", label:"Who’s going?", type:"members", value:t.travelers },
      { k:"notes", label:"Notes", type:"textarea", value:t.notes, placeholder:"Anything the family should know…" },
    ],
    onDelete: () => {
      if (!confirm(`Delete “${t.name}” and everything in it?`)) return;
      S.trips = S.trips.filter(x => x.id !== t.id);
      save(); go({ view:"home" });
      toast("Trip deleted");
    },
    onSubmit(v){
      if (!v.name) return;
      let [a, b] = [v.start, v.end];
      if (a && b && b < a) [a, b] = [b, a];
      Object.assign(t, { name:v.name, dest:v.dest, emoji:v.emoji, type:v.type, start:a, end:b, notes:v.notes, travelers:v.travelers });
      t.intake.mode = v.mode; t.intake.fixed = v.fixed;
      save(); render();
    }
  });
}

function memberForm(m){
  const isNew = !m;
  const usedColors = new Set(S.family.map(x => x.color));
  const nextColor = MEMBER_COLORS.find(c => !usedColors.has(c)) || MEMBER_COLORS[S.family.length % MEMBER_COLORS.length];
  openModal({
    title: isNew ? "Add family member" : "Edit " + m.name,
    submit: isNew ? "Add" : "Save",
    fields:[
      { k:"name", label:"Name", value:m?.name, required:true, placeholder:"e.g. Liz" },
      { k:"emoji", label:"Avatar", type:"emoji", options:MEMBER_EMOJI, value:m?.emoji || MEMBER_EMOJI[S.family.length % MEMBER_EMOJI.length] },
      { k:"color", label:"Color", type:"color", options:MEMBER_COLORS, value:m?.color || nextColor },
    ],
    onDelete: isNew ? null : () => {
      if (!confirm(`Remove ${m.name}? Their packing items become shared.`)) return;
      S.family = S.family.filter(x => x.id !== m.id);
      for (const t of S.trips){
        t.travelers = t.travelers.filter(id => id !== m.id);
        for (const p of t.packing) if (p.owner === m.id) p.owner = "shared";
        for (const i of t.ideas) i.votes = i.votes.filter(id => id !== m.id);
        for (const e of t.budget.expenses) if (e.by === m.id) e.by = "";
      }
      save(); render();
    },
    onSubmit(v){
      if (!v.name) return;
      if (isNew) S.family.push({ id:uid(), name:v.name, emoji:v.emoji, color:v.color });
      else Object.assign(m, { name:v.name, emoji:v.emoji, color:v.color });
      save(); render();
    }
  });
}

function stopForm(t, s, defaultDate, defaultTitle, afterCreate){
  const isNew = !s;
  const days = tripDays(t);
  const dateOpts = days.length
    ? days.map((d, i) => [d, "Day " + (i+1) + " — " + fmtD(d, true)])
    : [[defaultDate || today(), fmtD(defaultDate || today(), true)]];
  openModal({
    title: isNew ? "Add to the plan" : "Edit plan item",
    submit: isNew ? "Add" : "Save",
    fields:[
      { k:"title", label:"What", value:s?.title ?? defaultTitle, required:true, placeholder:"e.g. Snorkeling at the cove" },
      { k:"cat", label:"Type", type:"select", value:s?.cat || "activity",
        options:Object.entries(STOP_CATS).map(([k, e]) => [k, e + "  " + k[0].toUpperCase() + k.slice(1)]) },
      { k:"date", label:"Day", type:"select", options:dateOpts, value:s?.date || (days.includes(defaultDate) ? defaultDate : dateOpts[0][0]) },
      { k:"time", label:"Time (optional)", type:"time", value:s?.time },
      { k:"loc", label:"Place (links to maps)", value:s?.loc, placeholder:"e.g. Castillo de San Marcos" },
      { k:"notes", label:"Notes", type:"textarea", value:s?.notes },
    ],
    onDelete: isNew ? null : () => { t.stops = t.stops.filter(x => x.id !== s.id); save(); render(); },
    onSubmit(v){
      if (!v.title) return;
      if (isNew){
        t.stops.push({ id:uid(), date:v.date, time:v.time, title:v.title, cat:v.cat, loc:v.loc, notes:v.notes, done:false });
        if (afterCreate) afterCreate();
        toast("Added to the plan");
      } else Object.assign(s, { date:v.date, time:v.time, title:v.title, cat:v.cat, loc:v.loc, notes:v.notes });
      save(); render();
    }
  });
}

function expForm(t, e){
  const isNew = !e;
  openModal({
    title: isNew ? "Add expense" : "Edit expense",
    submit: isNew ? "Add" : "Save",
    fields:[
      { k:"desc", label:"What", value:e?.desc, required:true, placeholder:"e.g. Airport tacos" },
      { k:"amount", label:"Amount (" + S.currency + ")", type:"number", value:e?.amount, required:true, half:true },
      { k:"date", label:"Date", type:"date", value:e?.date || today(), half:true },
      { k:"cat", label:"Category", type:"select", value:e?.cat || "food", options:BUDGET_CATS.map(c => [c.k, c.e + "  " + c.n]) },
      { k:"by", label:"Paid by", type:"select", value:e?.by || "", options:[["","—"], ...S.family.map(m => [m.id, m.emoji + " " + m.name])] },
    ],
    onDelete: isNew ? null : () => { t.budget.expenses = t.budget.expenses.filter(x => x.id !== e.id); save(); render(); },
    onSubmit(v){
      if (!v.desc || !(Number(v.amount) >= 0)) return;
      if (isNew) t.budget.expenses.push({ id:uid(), desc:v.desc, amount:Number(v.amount), cat:v.cat, date:v.date, by:v.by });
      else Object.assign(e, { desc:v.desc, amount:Number(v.amount), cat:v.cat, date:v.date, by:v.by });
      save(); render();
    }
  });
}

function walletForm(t, w){
  const isNew = !w;
  openModal({
    title: isNew ? "Add to wallet" : "Edit booking",
    submit: isNew ? "Add" : "Save",
    fields:[
      { k:"kind", label:"Type", type:"select", value:w?.kind || "flight", options:Object.entries(WALLET_KINDS).map(([k, [e, n]]) => [k, e + "  " + n]) },
      { k:"title", label:"Name", value:w?.title, required:true, placeholder:"e.g. Delta 1132 · MCO → JFK" },
      { k:"code", label:"Confirmation #", value:w?.code, placeholder:"e.g. ABC123" },
      { k:"details", label:"Details", type:"textarea", value:w?.details, placeholder:"Times, seats, addresses, phone numbers…" },
    ],
    onDelete: isNew ? null : () => { t.wallet = t.wallet.filter(x => x.id !== w.id); save(); render(); },
    onSubmit(v){
      if (!v.title) return;
      if (isNew) t.wallet.push({ id:uid(), kind:v.kind, title:v.title, code:v.code, details:v.details });
      else Object.assign(w, { kind:v.kind, title:v.title, code:v.code, details:v.details });
      save(); render();
    }
  });
}

  const el = e.target.closest("[data-a]");
  if (!el || (modalEl && modalEl.contains(el))) return;
  const fn = A[el.dataset.a];
  if (fn) fn(el);
});
document.addEventListener("change", e => {
  const el = e.target.closest("[data-c]");
  if (!el) return;
  const fn = C[el.dataset.c];
  if (fn) fn(el);
});

render();

if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")){
  addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
